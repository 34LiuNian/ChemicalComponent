<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>合成路线 — ChemolRenderer Demo</title>
  <link rel="stylesheet" href="./lib/chemol-renderer.css" />

  <style>
    :root {
      --font-chem: "Times New Roman", Times, "SimSun", serif;
    }
    html, body {
      font-family: var(--font-chem);
      margin: 20px;
      background: #fff;
    }
    h2 { color: #044484; }

    /* ── 工具栏 ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: #f5f7fa;
      border-radius: 6px;
      font-size: 13px;
    }
    /* ── 字体上传 ── */
    .font-upload {
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 1px solid #ddd;
      padding-left: 14px;
    }
    .font-upload input[type="file"] { display: none; }
    .font-upload label {
      display: inline-block;
      padding: 4px 12px;
      background: #fff;
      border: 1px solid #bbb;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    .font-upload label:hover { background: #e8ecf0; }
    .font-name {
      font-size: 12px;
      color: #666;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── 旋转控制 ── */
    .rotate-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 1px solid #ddd;
      padding-left: 14px;
    }
    .rotate-controls label {
      font-weight: 600;
      white-space: nowrap;
    }
    .rotate-controls input[type="range"] {
      width: 130px;
      cursor: pointer;
      accent-color: #044484;
      vertical-align: middle;
    }
    .rotate-controls .rot-val {
      font-variant-numeric: tabular-nums;
      min-width: 42px;
      text-align: center;
      font-weight: 600;
      color: #044484;
      font-size: 14px;
    }
    .rotate-controls .rot-reset {
      width: 26px; height: 26px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .rotate-controls .rot-reset:hover { background: #e8ecf0; }

    /* ── 状态栏 ── */
    #status {
      font-family: monospace;
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    #reaction-scheme { margin-top: 20px; }
  </style>
</head>
<body>

<h2>🧪 合成路线渲染</h2>

<div class="toolbar">
  <span style="font-weight:600">fontFile（原生 C++ FreeType）</span>
  <span class="font-upload">
    <label for="fontFileInput">📁 上传字体 .ttf</label>
    <input type="file" id="fontFileInput" accept=".ttf" />
    <span class="font-name" id="fontFileName"></span>
  </span>
  <span class="rotate-controls">
    <label>旋转</label>
    <input type="range" id="rotSlider" min="-180" max="180" value="0" step="1" />
    <span class="rot-val" id="rotDisplay">0°</span>
    <button class="rot-reset" id="rotReset" title="重置旋转">↺</button>
  </span>
</div>

<div id="status">⏳ 加载中...</div>
<div id="reaction-scheme"></div>

<script src="./lib/rdkit-fs/RDKit_minimal.js"></script>
<script type="module">
  import {
    loadCustomRdkit,
    renderReactionScheme,
  } from "./lib/index.js";

  const STATUS = document.getElementById("status");

  // ============================================================
  // 1. 加载 FS 构建（FS API + MCS 支持）
  // ============================================================
  STATUS.textContent = "⏳ 初始化 RDKit (FS 构建)...";
  const RDKit = await loadCustomRdkit("./lib/rdkit-fs/");
  STATUS.innerHTML = `✅ RDKit <b>${RDKit.version()}</b> (FS 构建)`;

  // ============================================================
  // 2. 注入字体到 WASM 虚拟文件系统
  // ============================================================
  const FONT_VIRTUAL_PATH = "/fonts/times.ttf";
  const FONT_FAMILY = "'Times New Roman',Times,'SimSun',serif";

  let fontLoaded = false;
  let fontName = '';           // 当前字体文件名（用于显示）
  let fontPath = FONT_VIRTUAL_PATH;  // 当前字体在虚拟 FS 中的路径

  const FS = RDKit.FS || window.FS;
  if (!FS) {
    STATUS.innerHTML += '<br>⚠️ FS API 不可用';
  } else {
    try {
      FS.mkdir("/fonts");
      STATUS.innerHTML += '<br>⏳ 获取 TTF 字体...';

      const FONT_SOURCES = [
        "https://cdn.jsdelivr.net/gh/ArtifexSoftware/urw-base35-fonts@master/fonts/NimbusRoman-Regular.ttf",
        "https://github.com/ArtifexSoftware/urw-base35-fonts/raw/master/fonts/NimbusRoman-Regular.ttf",
      ];
      let fontU8 = null;
      for (const src of FONT_SOURCES) {
        try {
          const resp = await fetch(src);
          if (resp.ok) { fontU8 = new Uint8Array(await resp.arrayBuffer()); break; }
        } catch { /* next */ }
      }
      if (fontU8) {
        FS.writeFile(fontPath, fontU8);
        fontLoaded = true;
        fontName = 'NimbusRoman-Regular.ttf (CDN)';
        STATUS.innerHTML += ` ✅ ${fontPath} (${fontU8.length} bytes)`;
      } else {
        STATUS.innerHTML += ' ⚠️ 字体获取失败';
      }
    } catch (e) {
      STATUS.innerHTML += ` ⚠️ ${e.message}`;
    }
  }

  // ============================================================
  // 2b. 上传自定义字体
  // ============================================================
  const FILE_INPUT = document.getElementById("fontFileInput");
  const FILE_NAME  = document.getElementById("fontFileName");

  FILE_INPUT.addEventListener("change", async () => {
    const file = FILE_INPUT.files[0];
    if (!file || !file.name.endsWith(".ttf")) return;

    const buf = await file.arrayBuffer();
    const u8  = new Uint8Array(buf);

    try {
      // 写入虚拟 FS（文件名自定义，避免路径冲突）
      const customPath = `/fonts/${file.name}`;
      FS.writeFile(customPath, u8);

      // 更新全局字体路径
      fontPath   = customPath;
      fontName   = file.name;
      fontLoaded = true;

      FILE_NAME.textContent = file.name;
      STATUS.innerHTML += `<br>📁 已上传自定义字体: <b>${file.name}</b> (${u8.length} bytes) → ${customPath}`;

      // 自动用新字体重渲染
      await render();
    } catch (e) {
      STATUS.innerHTML += `<br>⚠️ 字体上传失败: ${e.message}`;
    }
  });

  // ============================================================
  // 3. 反应式数据
  // ============================================================
const STEPS = [
    { type: "mol", id: "molA", smiles: "COC1=C(OC)C=C(C(=O)OC)C(N)=C1", label: "A" },
    { type: "arrow", top: "HCONH<sub>2</sub>, HCOONH<sub>4</sub>", bottom: "" },
    { type: "mol", id: "molB", smiles: "COC1=CC2=C(C=C1OC)C(=O)NC=N2", label: "B" },
    { type: "arrow", top: "H<sub>3</sub>C-SO<sub>3</sub>H", bottom: "" },
    { type: "mol", id: "molC", smiles: "COC1=CC2=C(C=C1O)C(=O)NC=N2", label: "C" },
    { type: "arrow", top: "(CH<sub>3</sub>CO)<sub>2</sub>O", bottom: "" },
    { type: "mol", id: "molD", smiles: "CC(=O)OC1=CC2=C(C=C1OC)C(=O)NC=N2", label: "D" },
    { type: "arrow", top: "", bottom: "" },
    { type: "mol", id: "molE", smiles: "CC(=O)OC1=CC2=C(C=C1OC)C(Cl)=NC=N2", label: "E" },
    { type: "arrow", top: "3-Chloro-4-fluoroaniline", bottom: "" },
    { type: "mol", id: "molF", smiles: "CC(=O)OC1=CC2=C(C=C1OC)C(NC3=CC(Cl)=C(F)C=C3)=NC=N2", label: "F", large: true },
    { type: "arrow", top: "NH<sub>3</sub> &middot; H<sub>2</sub>O", bottom: "MeOH" },
    { type: "mol", id: "molG", smiles: "COC1=CC2=C(C=C1O)C(NC3=CC(Cl)=C(F)C=C3)=NC=N2", label: "G", large: true },
  ];

  // ============================================================
  // 4. 渲染
  // ============================================================
  let currentScheme = null;
  let rotationAngle = 0;   // 当前旋转角度（度）

  async function render() {
    STATUS.innerHTML += '<br>⏳ 渲染...';

    if (currentScheme) currentScheme.dispose();

    // 用 rotateDeg 替代原来的 autoAlign: { rotateDeg: -30 }
    currentScheme = await renderReactionScheme("#reaction-scheme", STEPS, {
      fontFamily: FONT_FAMILY,
      autoAlign: true,
      rotateDeg: rotationAngle,
      resize: 500,
      fontFile: fontLoaded ? fontPath : undefined,
    });

    STATUS.innerHTML += ' ✅ fontFile (C++ FreeType)';
  }

  await render();

  // ── 旋转滑块联动 ──
  const ROT_SLIDER = document.getElementById("rotSlider");
  const ROT_DISPLAY = document.getElementById("rotDisplay");
  const ROT_RESET  = document.getElementById("rotReset");

  ROT_SLIDER.addEventListener("input", () => {
    rotationAngle = parseFloat(ROT_SLIDER.value);
    ROT_DISPLAY.textContent = `${rotationAngle}°`;
  });

  // 鼠标松开 / 触摸结束时触发重渲染（避免拖拽过程中频繁重渲染）
  let rotTimer = null;
  function scheduleRotateRender() {
    clearTimeout(rotTimer);
    rotTimer = setTimeout(() => render(), 80);
  }
  ROT_SLIDER.addEventListener("change", scheduleRotateRender);
  ROT_SLIDER.addEventListener("mouseup", scheduleRotateRender);
  ROT_SLIDER.addEventListener("touchend", scheduleRotateRender);

  ROT_RESET.addEventListener("click", () => {
    rotationAngle = 0;
    ROT_SLIDER.value = 0;
    ROT_DISPLAY.textContent = "0°";
    render();
  });
</script>

</body>
</html>
